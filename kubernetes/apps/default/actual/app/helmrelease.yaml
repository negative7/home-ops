---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: actual
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      actual:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: ghcr.io/actualbudget/actual-server
              tag: 26.5.2
            env:
              ACTUAL_PORT: &httpPort 5006
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
          mcp:
            image:
              repository: sstefanov/actual-mcp
              tag: v1.11.2
            args:
              - --sse
              - --enable-bearer
            env:
              ACTUAL_DATA_DIR: /config
              ACTUAL_SERVER_URL: http://actual-app.default.svc.cluster.local:5006
              ACTUAL_PASSWORD: 
                valueFrom:
                  secretKeyRef:
                    name: actual-secret
                    key: password
              ACTUAL_BUDGET_SYNC_ID: 
                valueFrom:
                  secretKeyRef:
                    name: actual-secret
                    key: sync_id
              BEARER_TOKEN: 
                valueFrom:
                  secretKeyRef:
                    name: actual-secret
                    key: bearer_token
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M

    service:
      app:
        ports:
          http:
            port: *httpPort
        primary: true
      mcp:
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - actual.negative7.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
      mcp:
        hostnames: 
          - actual-mcp.negative7.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: mcp
                port: 3000

    persistence:
      mcp:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          actual:
            mcp:
              - path: /config
      data:
        existingClaim: actual-data
        advancedMounts:
          actual:
            app:
              - path: /data
