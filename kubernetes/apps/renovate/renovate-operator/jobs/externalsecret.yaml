---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: negative7-bot-pem
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: negative7-bot-pem
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: Github
        property: negative7_bot_key
