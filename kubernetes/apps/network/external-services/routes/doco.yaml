---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.envoyproxy.io/backend_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  labels:
    app.kubernetes.io/instance: doco-cd-proxy
    app.kubernetes.io/name: doco-cd-proxy
  name: doco-cd-proxy
spec:
  endpoints:
    - fqdn:
        hostname: truenas.homelab.internal
        port: 8880

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: doco-cd-proxy
  annotations:
    gatus.home-operations.com/endpoint: |-
      path: /v1/health
spec:
  hostnames:
    - doco.negative7.com
  parentRefs:
    - name: envoy-external
      namespace: network
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: doco-cd-proxy
      matches:
        - path:
            type: PathPrefix
            value: /
